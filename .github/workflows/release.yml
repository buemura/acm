name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Test
        run: go test ./...

      - name: Build binaries
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          for os in linux darwin windows; do
            for arch in amd64 arm64; do
              output="acm-${os}-${arch}"
              if [ "$os" = "windows" ]; then
                output="${output}.exe"
              fi
              GOOS=$os GOARCH=$arch go build -ldflags="-s -w" -o "dist/${output}" .
            done
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

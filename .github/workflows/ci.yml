name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        run: go build -v .

      - name: Test
        run: go test -v ./...

      - name: Smoke Test (Unix)
        if: runner.os != 'Windows'
        run: |
          ./acm provider
          ./acm list --help
          ./acm clean --help

      - name: Smoke Test (Windows)
        if: runner.os == 'Windows'
        run: |
          .\acm.exe provider
          .\acm.exe list --help
          .\acm.exe clean --help
